name: i9star-prd
services:
  app:
    build:
      context: .
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
    container_name: i9star_app_prd
    restart: always
    env_file:
      - .env.prd
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - uploads_prd:/usr/src/app/uploads
  postgres:
    image: postgres:16-alpine
    container_name: i9star_postgres_prd
    restart: always
    env_file:
      - .env.prd
    volumes:
      - i9star_prd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  i9star_prd_postgres_data:
    external: true
    name: i9star-prd_i9star_prd_postgres_data
  uploads_prd:
